name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.2.2"
  GODOT_RELEASE: "stable"
  EXPORT_NAME: "LevelDevil"

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Export Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE} ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}

      - name: Setup Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
        continue-on-error: true

      - name: Create Export Preset
        run: |
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/android/LevelDevil.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false
          script_export_mode=2
          
          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/gradle_build_directory=""
          gradle_build/android_source_template=""
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          keystore/debug="$GODOT_PATH/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release="/tmp/release.keystore"
          keystore/release_user="${{ secrets.KEY_ALIAS }}"
          keystore/release_password="${{ secrets.KEY_PASSWORD }}"
          one_click_deploy_clear_previous_install=false
          package/unique_name="com.yourname.leveldevil"
          package/name="Level Devil"
          package/signed=true
          package/classify_as_game=true
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false
          package/show_in_android_tv=false
          package/show_as_launcher_app=false
          package/show_in_app_library=false
          package/meta_quest_system_splash_screen=""
          package/export_format=0
          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          screen/keep_screen_on=true
          permission/access_checkin_properties=false
          permission/access_coarse_location=false
          permission/access_fine_location=false
          permission/access_mock_location=false
          permission/access_network_state=false
          permission/access_wifi_state=false
          permission/bluetooth=false
          permission/bluetooth_admin=false
          permission/bluetooth_privileged=false
          permission/broadcast_sticky=false
          permission/call_phone=false
          permission/call_privileged=false
          permission/camera=false
          permission/capture_audio_output=false
          permission/change_network_state=false
          permission/change_wifi_multicast_state=false
          permission/change_wifi_state=false
          permission/clear_app_cache=false
          permission/control_location_updates=false
          permission/delete_cache_files=false
          permission/delete_packages=false
          permission/expand_status_bar=false
          permission/factory_test=false
          permission/flashlight=false
          permission/force_back=false
          permission/get_accounts=false
          permission/get_package_size=false
          permission/get_tasks=false
          permission/global_search=false
          permission/hardware_test=false
          permission/inject_events=false
          permission/install_location_provider=false
          permission/install_packages=false
          permission/install_shortcut=false
          permission/internal_system_window=false
          permission/internet=false
          permission/kill_background_processes=false
          permission/location_hardware=false
          permission/manage_accounts=false
          permission/manage_app_tokens=false
          permission/master_clear=false
          permission/media_content_control=false
          permission/modify_audio_settings=false
          permission/modify_phone_state=false
          permission/mount_format_filesystems=false
          permission/mount_unmount_filesystems=false
          permission/nfc=false
          permission/persistent_activity=false
          permission/process_outgoing_calls=false
          permission/read_calendar=false
          permission/read_call_log=false
          permission/read_contacts=false
          permission/read_external_storage=false
          permission/read_frame_buffer=false
          permission/read_input_state=false
          permission/read_logs=false
          permission/read_phone_state=false
          permission/read_profile=false
          permission/read_secure_settings=false
          permission/read_settings=false
          permission/read_sms=false
          permission/read_social_stream=false
          permission/read_sync_settings=false
          permission/read_sync_stats=false
          permission/read_user_dictionary=false
          permission/reboot=false
          permission/receive_boot_completed=false
          permission/receive_mms=false
          permission/receive_sms=false
          permission/receive_wap_push=false
          permission/record_audio=false
          permission/reorder_tasks=false
          permission/restart_packages=false
          permission/send_respond_via_message=false
          permission/send_sms=false
          permission/set_activity_watcher=false
          permission/set_alarm=false
          permission/set_always_on_vpn=false
          permission/set_animation_scale=false
          permission/set_debug_app=false
          permission/set_orientation=false
          permission/set_pointer_speed=false
          permission/set_preferred_applications=false
          permission/set_process_limit=false
          permission/set_time=false
          permission/set_time_zone=false
          permission/set_wallpaper=false
          permission/set_wallpaper_hints=false
          permission/signal_persistent_processes=false
          permission/status_bar=false
          permission/subscribed_feeds_read=false
          permission/subscribed_feeds_write=false
          permission/system_alert_window=false
          permission/transmit_ir=false
          permission/uninstall_shortcut=false
          permission/update_device_stats=false
          permission/use_credentials=false
          permission/use_sip=false
          permission/vibrate=false
          permission/wake_lock=false
          permission/write_apn_settings=false
          permission/write_calendar=false
          permission/write_call_log=false
          permission/write_contacts=false
          permission/write_external_storage=false
          permission/write_gservices=false
          permission/write_history_bookmarks=false
          permission/write_profile=false
          permission/write_secure_settings=false
          permission/write_settings=false
          permission/write_sms=false
          permission/write_social_stream=false
          permission/write_sync_settings=false
          permission/write_user_dictionary=false
          EOF

      - name: Build APK
        run: |
          mkdir -p build/android
          godot --headless --export-release "Android" build/android/LevelDevil.apk || \
          godot --headless --export-debug "Android" build/android/LevelDevil.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LevelDevil-APK
          path: build/android/LevelDevil.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Level Devil Build ${{ github.run_number }}"
          files: build/android/LevelDevil.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
